spring.application.name=appointment-api

# JSON uses snake_case (patient_id, doctor_id, time_slot) but Java fields are camelCase.
# This makes Jackson map between the two automatically instead of returning null for every field.
spring.jackson.property-naming-strategy=SNAKE_CASE

# H2 in-memory database - resets every restart, zero setup needed
spring.datasource.url=jdbc:h2:mem:clinicdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=test
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional: hit http://localhost:8080/h2-console to inspect data while testing
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
